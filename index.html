<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/smart-food-plan/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>web-mui</title>
    <script>
      (function () {
        var redirect = window.location.search.match(/[?&]p=([^&]+)/);
        if (!redirect) return;

        var target = decodeURIComponent(redirect[1]);
        var basePath = window.location.pathname.replace(/\/$/, "");
        var resolved =
          target.indexOf(basePath + "/") === 0
            ? target
            : target.charAt(0) === "/"
              ? basePath + target
              : basePath + "/" + target;

        window.history.replaceState(null, "", resolved);
      })();
    </script>
    <script type="module" crossorigin src="/smart-food-plan/assets/index-DETP9clZ.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
