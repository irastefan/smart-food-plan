<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>web-mui</title>
    <script>
      (function () {
        var redirect = window.location.search.match(/[?&]p=([^&]+)/);
        if (!redirect) return;

        var target = decodeURIComponent(redirect[1]);
        window.history.replaceState(null, "", target);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
